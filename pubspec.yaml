name: moomoo
description: A new Flutter project for sign language translation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  
  # Navigation
  go_router: ^17.2.3
  app_links: ^7.0.0
  
  # Authentication & Backend
  supabase_flutter: ^2.5.5
  
  # Camera & Media
  camera: ^0.12.0+1
  permission_handler: ^12.0.1
  video_player: ^2.8.6
  chewie: ^1.8.5
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  image: ^4.2.0
  path_provider: ^2.1.3
  cached_network_image: ^3.3.1
  
  # 3D & Landmarks
  model_viewer_plus: ^1.7.0
  
  # UI & Animations
  flutter_animate: ^4.5.0
  rive: ^0.14.6
  flutter_svg: ^2.0.10+1
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  fl_chart: ^1.2.0

  # TTS / STT (prêts, activables en V2)
  flutter_tts: ^4.1.1
  speech_to_text: ^7.3.0
  
  # Utils
  logger: ^2.3.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  intl: ^0.20.2
  flutter_secure_storage: ^10.2.0
  connectivity_plus: ^7.1.1
  url_launcher: ^6.3.0
  share_plus: ^12.0.2
  path: ^1.9.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Generators
  build_runner: ^2.4.11
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  
  # Lints
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/google_logo.png
    - assets/models/
    - assets/images/onboarding/
    - assets/images/empty_state/
  
  generate: true
